<section class="py-16 bg-white">
  <div class="max-w-7xl mx-auto px-8 text-center">
    <h2 class="text-3xl font-bold text-gray-900 mb-2">Browse by Specialty</h2>
    <p class="text-gray-600 mb-12">Find the right care for your needs</p>

    <div class="grid grid-cols-5 gap-6">
      <div
        *ngFor="let specialty of specialties"
        class="bg-white rounded-lg shadow-md hover:shadow-lg transition-shadow p-6 text-center"
      >
        <!-- Icon -->
        <div class="flex justify-center mb-4">
          <div class="w-12 h-12 flex items-center justify-center text-primary">
            <!-- Dental Icon -->
            <svg
              *ngIf="specialty.icon === 'dental'"
              xmlns="http://www.w3.org/2000/svg"
              class="w-10 h-10"
              fill="none"
              fill="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                d="M19.03 2.13a4.75 4.75 0 0 0-5.54 1.55l-.68.91c-.38.5-1.23.5-1.6 0l-.68-.91a4.72 4.72 0 0 0-5.54-1.55 4.7 4.7 0 0 0-2.97 4.39c0 1.72.21 3.44.63 5.12l2.04 8.18A2.88 2.88 0 0 0 7.48 22h.12c1.28 0 2.41-.86 2.76-2.08l1.2-4.2c.12-.42.51-.72.95-.72s.83.29.95.72l1.2 4.2A2.88 2.88 0 0 0 17.42 22c1.41 0 2.6-1.01 2.83-2.4l1.33-7.99c.28-1.67.42-3.38.42-5.08 0-1.95-1.17-3.67-2.97-4.39Zm.58 9.14-1.33 7.99a.87.87 0 0 1-.86.73c-.39 0-.73-.26-.84-.63l-1.2-4.2c-.37-1.28-1.55-2.17-2.87-2.17s-2.51.89-2.87 2.17l-1.2 4.2c-.11.37-.45.63-.84.63h-.12c-.4 0-.75-.27-.85-.66l-2.04-8.18c-.38-1.51-.57-3.07-.57-4.63 0-1.12.67-2.12 1.72-2.54 1.15-.46 2.46-.09 3.2.9l.69.91c.56.75 1.46 1.2 2.4 1.2s1.84-.45 2.4-1.2l.68-.91c.74-.99 2.05-1.36 3.2-.9 1.04.42 1.72 1.41 1.72 2.54 0 1.59-.13 3.18-.39 4.75Z"
              ></path>
            </svg>

            <!-- Eye Icon -->
            <svg
              *ngIf="specialty.icon === 'eye'"
              class="w-10 h-10"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
              />
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
              />
            </svg>

            <!-- Surgery Icon -->
            <svg
              *ngIf="specialty.icon === 'surgery'"
              class="w-10 h-10"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zM7 3V1m0 18v2m8-10h2m-2 0h2m-2 0v2m0-2v-2"
              />
            </svg>
            <!-- Bone Icon -->

            <svg
              *ngIf="specialty.icon === 'bone'"
              class="w-10 h-10"
              xmlns="http://www.w3.org/2000/svg"
              fill="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                d="M19.03 4.97c-.18-.68-.53-1.3-1.03-1.8A3.996 3.996 0 0 0 11.18 6c0 .73.19 1.42.55 2.03l-3.71 3.71c-1.53-.9-3.54-.7-4.85.62-.75.75-1.17 1.76-1.17 2.83s.42 2.07 1.17 2.83c.5.5 1.12.85 1.8 1.03a3.974 3.974 0 0 0 3.86 2.97c1.07 0 2.07-.42 2.83-1.17a4.006 4.006 0 0 0 .62-4.85l3.71-3.71c1.5.89 3.59.65 4.86-.62.75-.75 1.17-1.76 1.17-2.83s-.42-2.07-1.17-2.83c-.5-.5-1.12-.85-1.8-1.03Zm.38 5.26c-.75.75-2.07.75-2.82 0l-.71-.71-6.36 6.36.71.71c.78.78.78 2.04 0 2.82-.75.75-2.07.75-2.82 0a2.02 2.02 0 0 1-.57-1.31l-.05-.9-.9-.05c-.35-.02-.87-.13-1.31-.57C4.2 16.2 4 15.7 4 15.17s.21-1.04.58-1.41c.39-.39.9-.58 1.41-.58s1.02.19 1.41.58l.71.71 6.36-6.36-.71-.71c-.38-.38-.58-.88-.58-1.41s.21-1.04.58-1.41c.78-.78 2.04-.78 2.82 0 .44.44.55.95.57 1.31l.05.9.9.05c.5.03.97.23 1.31.57.38.38.58.88.58 1.41s-.21 1.04-.58 1.41"
              ></path>
            </svg>
            <!-- Heart Icon -->
            <svg
              *ngIf="specialty.icon === 'heart'"
              class="w-10 h-10"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"
              />
            </svg>
          </div>
        </div>

        <h3 class="font-semibold text-gray-900 mb-1">{{ specialty.name }}</h3>
        <p class="text-sm text-gray-500">{{ specialty.clinics }} clinics</p>
      </div>
    </div>
  </div>
</section>
