<header class="bg-white shadow-sm sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-8 py-4 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center text-white">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="currentColor"/>
          <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2"/>
        </svg>
      </div>
      <span class="text-xl font-semibold text-gray-900">MediTunisia</span>
    </div>
    
    <nav class="flex gap-8">
      <a *ngFor="let item of navItems" [href]="item.link" 
         class="text-gray-600 hover:text-primary transition-colors text-sm">
        {{ item.label }}
      </a>
    </nav>
    
    <div class="flex gap-4">
      <button class="text-gray-600 hover:text-primary px-6 py-2 transition-colors text-sm">
        Sign in
      </button>
      <button class="bg-primary hover:bg-primary-dark text-white px-6 py-2 rounded-md transition-colors text-sm font-medium">
        Get Started
      </button>
    </div>
  </div>
</header>
