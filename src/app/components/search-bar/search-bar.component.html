<div class="relative z-10 -mt-16 max-w-5xl mx-auto px-8">
  <div class="bg-white rounded-lg shadow-lg p-6">
    <div class="grid grid-cols-3 gap-4">
        
      <!-- Location Input -->
      <div class="flex items-center gap-3 px-4 py-3 border border-gray-300 rounded-md">
        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        <input 
          type="text" 
          placeholder="City (e.g. Tunis, Sousse)"
          class="flex-1 outline-none text-sm text-gray-700 placeholder-gray-400">
      </div>

      <!-- Specialty Input -->
      <div class="flex items-center gap-3 px-4 py-3 border border-gray-300 rounded-md">
        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input 
          type="text" 
          placeholder="Specialty (e.g. Dental, Ophthalmology)"
          class="flex-1 outline-none text-sm text-gray-700 placeholder-gray-400">
      </div>

      <!-- Search Button -->
      <button class="bg-primary hover:bg-primary-dark text-white font-medium rounded-md transition-colors flex items-center justify-center gap-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        Search
      </button>
    </div>
  </div>
</div>
